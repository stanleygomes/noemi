name: Deploy Landpage

on:
  push:
    branches: [master]
    paths:
      - "landpage/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    defaults:
      run:
        working-directory: landpage

    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landpage/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_LANDPAGE_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_LANDPAGE_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_LANDPAGE_PROJECT_ID }}
          working-directory: landpage
          vercel-args: "--prod --cwd=landpage"
